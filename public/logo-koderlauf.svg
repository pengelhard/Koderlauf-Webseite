<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <defs>
    <linearGradient id="og" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF9F1C"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Runner icon -->
  <g transform="translate(2,4)" filter="url(#glow)">
    <circle cx="16" cy="6" r="5" fill="url(#og)"/>
    <path d="M8 18 L14 26 L10 38 M14 26 L22 36 M10 14 L16 22 L26 18 M16 22 L18 32" stroke="url(#og)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text "Koderlauf" -->
  <text x="42" y="35" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="32" letter-spacing="-0.5" fill="url(#og)" filter="url(#glow)">Koderlauf</text>
</svg>
