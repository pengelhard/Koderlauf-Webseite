<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" fill="none">
  <defs>
    <linearGradient id="og2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF9F1C"/>
    </linearGradient>
    <linearGradient id="eg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Mini mascot -->
  <g transform="translate(2,2) scale(0.24)">
    <!-- Tail -->
    <path d="M42 95 Q15 60 30 35 Q38 22 48 30 Q55 38 45 55 Q38 70 52 88" stroke="#111" stroke-width="12" stroke-linecap="round" fill="none"/>
    <!-- Body -->
    <ellipse cx="95" cy="115" rx="32" ry="42" fill="#111" transform="rotate(-10, 95, 115)"/>
    <ellipse cx="100" cy="108" rx="14" ry="22" fill="#1a1a1a" transform="rotate(-8, 100, 108)"/>
    <!-- Back leg -->
    <path d="M85 150 L70 175 L65 195 Q63 205 72 205 L80 203" stroke="#111" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="#111"/>
    <!-- Front leg -->
    <path d="M110 148 L130 178 L140 198 Q143 207 134 206 L126 203" stroke="#111" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="#111"/>
    <!-- Front arm -->
    <path d="M105 95 L130 80 L142 72" stroke="#111" stroke-width="12" stroke-linecap="round" fill="none"/>
    <circle cx="144" cy="70" r="7" fill="#111"/>
    <!-- Back arm -->
    <path d="M90 100 L105 120 L115 128" stroke="#111" stroke-width="11" stroke-linecap="round" fill="none"/>
    <!-- Neck + Head -->
    <ellipse cx="100" cy="78" rx="15" ry="10" fill="#111"/>
    <ellipse cx="105" cy="55" rx="30" ry="28" fill="#111"/>
    <!-- Ears -->
    <path d="M82 32 L75 5 L95 22 Z" fill="#111"/>
    <path d="M122 28 L130 2 L110 20 Z" fill="#111"/>
    <!-- Eyes -->
    <ellipse cx="92" cy="50" rx="9" ry="10" fill="url(#eg)"/>
    <ellipse cx="92" cy="50" rx="4" ry="5.5" fill="#000"/>
    <circle cx="90" cy="47" r="2" fill="#fff" opacity="0.8"/>
    <ellipse cx="118" cy="48" rx="9" ry="10" fill="url(#eg)"/>
    <ellipse cx="118" cy="48" rx="4" ry="5.5" fill="#000"/>
    <circle cx="116" cy="45" r="2" fill="#fff" opacity="0.8"/>
    <!-- Smile -->
    <path d="M95 65 Q105 76 118 64" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M100 68 L102 72 L104 68" fill="#fff"/>
    <path d="M108 67 L110 71 L112 67" fill="#fff"/>
    <!-- Whiskers -->
    <line x1="80" y1="56" x2="60" y2="52" stroke="#555" stroke-width="1.2"/>
    <line x1="80" y1="60" x2="58" y2="62" stroke="#555" stroke-width="1.2"/>
    <line x1="130" y1="54" x2="150" y2="48" stroke="#555" stroke-width="1.2"/>
    <line x1="130" y1="58" x2="152" y2="58" stroke="#555" stroke-width="1.2"/>
  </g>
  <!-- Text "Koderlauf" -->
  <text x="62" y="40" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="34" letter-spacing="-0.5" fill="url(#og2)" filter="url(#glow2)">Koderlauf</text>
</svg>
