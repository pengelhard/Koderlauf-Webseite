<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 250" fill="none">
  <defs>
    <linearGradient id="eyeG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="110" cy="242" rx="60" ry="6" fill="#000" opacity="0.18"/>

  <!-- TAIL - flowing curve behind body -->
  <path d="M55 100 C30 75, 15 45, 35 25 C45 15, 58 18, 55 35 C52 50, 45 65, 58 90"
        stroke="#0f0f0f" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M55 100 C30 75, 15 45, 35 25 C45 15, 58 18, 55 35 C52 50, 45 65, 58 90"
        stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- BACK LEG (trailing behind) -->
  <path d="M88 160 L68 185 L58 210 C55 218, 60 222, 68 220 L78 216"
        stroke="#0f0f0f" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="#0f0f0f"/>
  <!-- Back shoe -->
  <path d="M58 210 C55 218, 60 222, 68 220 L80 216 C86 214, 84 208, 78 208"
        fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <path d="M65 215 Q70 212, 76 214" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- BACK ARM (swinging behind) -->
  <path d="M92 108 L108 128 L118 140"
        stroke="#0f0f0f" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- BODY - muscular torso -->
  <ellipse cx="102" cy="125" rx="35" ry="45" fill="#0f0f0f" transform="rotate(-12, 102, 125)"/>
  <!-- Body muscle highlights -->
  <path d="M90 95 Q100 105, 95 120" stroke="#1f1f1f" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M108 100 Q115 115, 108 135" stroke="#1f1f1f" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M85 130 Q100 140, 115 130" stroke="#1f1f1f" stroke-width="1.2" fill="none" opacity="0.4"/>

  <!-- FRONT LEG (striding forward) -->
  <path d="M118 155 L140 185 L152 210 C155 220, 148 223, 140 220 L130 215"
        stroke="#0f0f0f" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="#0f0f0f"/>
  <!-- Front shoe -->
  <path d="M152 210 C155 220, 148 223, 140 220 L128 216 C122 214, 124 208, 130 208"
        fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <path d="M135 215 Q140 212, 146 214" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Shoe sole detail -->
  <path d="M152 212 Q150 218, 142 220" stroke="#333" stroke-width="1" fill="none"/>

  <!-- FRONT ARM (pumping forward with fist) -->
  <path d="M112 100 L138 85 L152 76"
        stroke="#0f0f0f" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Fist -->
  <circle cx="155" cy="74" r="9" fill="#0f0f0f"/>
  <path d="M150 70 Q155 65, 160 70" stroke="#2a2a2a" stroke-width="1.2" fill="none"/>
  <path d="M151 74 Q155 72, 159 74" stroke="#2a2a2a" stroke-width="1" fill="none"/>

  <!-- NECK -->
  <ellipse cx="108" cy="84" rx="16" ry="12" fill="#0f0f0f"/>

  <!-- HEAD -->
  <ellipse cx="112" cy="58" rx="33" ry="30" fill="#0f0f0f"/>

  <!-- LEFT EAR -->
  <path d="M86 34 L78 4 L100 24 Z" fill="#0f0f0f"/>
  <path d="M88 30 L82 10 L97 25 Z" fill="#1a1a1a"/>

  <!-- RIGHT EAR -->
  <path d="M132 30 L142 0 L118 22 Z" fill="#0f0f0f"/>
  <path d="M130 27 L138 8 L121 23 Z" fill="#1a1a1a"/>

  <!-- LEFT EYE -->
  <ellipse cx="98" cy="52" rx="11" ry="12" fill="url(#eyeG)"/>
  <ellipse cx="98" cy="52" rx="5" ry="7" fill="#000"/>
  <circle cx="95" cy="48" r="2.5" fill="#fff" opacity="0.85"/>
  <circle cx="100" cy="55" r="1.2" fill="#fff" opacity="0.4"/>

  <!-- RIGHT EYE -->
  <ellipse cx="126" cy="50" rx="11" ry="12" fill="url(#eyeG)"/>
  <ellipse cx="126" cy="50" rx="5" ry="7" fill="#000"/>
  <circle cx="123" cy="46" r="2.5" fill="#fff" opacity="0.85"/>
  <circle cx="128" cy="53" r="1.2" fill="#fff" opacity="0.4"/>

  <!-- NOSE -->
  <path d="M110 62 L108 65 L112 65 Z" fill="#2a2a2a"/>

  <!-- MOUTH / GRIN -->
  <path d="M98 68 Q112 82, 128 66" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Teeth -->
  <path d="M105 72 L107 77 L109 72" fill="#fff"/>
  <path d="M113 73 L115 78 L117 73" fill="#fff"/>
  <path d="M121 71 L123 75 L125 70" fill="#fff"/>

  <!-- WHISKERS LEFT -->
  <line x1="84" y1="58" x2="60" y2="53" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="84" y1="62" x2="58" y2="64" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="84" y1="66" x2="62" y2="72" stroke="#444" stroke-width="1.3" stroke-linecap="round"/>

  <!-- WHISKERS RIGHT -->
  <line x1="140" y1="55" x2="164" y2="48" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="140" y1="59" x2="166" y2="58" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="138" y1="63" x2="162" y2="68" stroke="#444" stroke-width="1.3" stroke-linecap="round"/>
</svg>
